{% set path = page.colocated_path ~ "/figs/" ~ src %}
{% set metadata = get_image_metadata(path=path) %}

<img data-src="{{ get_url(path=path) | safe }}"
    width={{ metadata.width }}
    height={{ metadata.height }}
    style="width: {{ width | default(value="auto") }}; height: {{ height | default(value="auto") }};">
