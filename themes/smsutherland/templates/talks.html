{% extends "base.html" %}

{% block content %}
    {{ section.content | safe }}

    {% for page in section.pages | reverse %}
        <h2>
            <a href="{{ page.permalink }}">{{ page.title }}</a>
        </h2>
        <p>
            {{ page.extra.location }} {{ page.date }}
        </p>
    {% endfor %}
{% endblock %}
